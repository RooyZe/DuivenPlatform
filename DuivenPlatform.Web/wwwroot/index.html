<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duiven Platform</title>
    <link rel="stylesheet" href="/css/spa.css">
</head>
<body>
    <div id="nav-overlay" class="nav-overlay" aria-hidden="true">
        <div class="nav-overlay-backdrop"></div>
        <div class="app-shell">
            <header class="site-header">
                <div class="header-inner">
                    <div class="header-left">
                        <a href="/" class="logo-link" aria-label="Combinatie ten Cate">
                            <img src="/images/duif.jpg" alt="Combinatie ten Cate" class="logo-img" 
                                 onerror="this.onerror=null;this.src='/images/logo.svg'" />
                        </a>
                    </div>

                    <div class="header-title">
                        <a href="/">Combinatie ten Cate</a>
                    </div>

                    <div class="header-icons">
                        <a href="#" id="cart-icon-nav" title="Winkelwagen" class="icon cart-icon-wrapper">
                            🛒
                            <span id="cart-count-nav" class="cart-badge"></span>
                        </a>
                        <a href="#" title="User" class="icon">👤</a>
                        <a href="#" id="nav-close-icon" class="icon" aria-label="Sluit navigatie">☰</a>
                    </div>
                </div>
            </header>

            <main class="site-main nav-page">
                <div class="section-bar">
                    <h2>Navigatie</h2>
                </div>

                <div class="info-card">
                    <div class="info-card-inner">
                        <nav class="nav-page-inner">
                            <a href="/" class="nav-item-large">Home</a>
                            <a href="/duiven" class="nav-item-large">Duiven</a>
                            <a href="/wedvluchten" class="nav-item-large">Vluchten</a>
                            <a href="/duiven-te-koop" class="nav-item-large">Duiven te koop</a>
                        </nav>
                    </div>
                </div>

                <div style="padding: 0 12px 12px 12px;">
                    <button id="nav-close" class="nav-close">Sluiten</button>
                </div>
            </main>
        </div>
    </div>

    <div class="app-shell">
        <header class="site-header">
            <div class="header-inner">
                <div class="header-left">
                    <a href="/" class="logo-link" aria-label="Combinatie ten Cate">
                        <img src="/images/duif.jpg" alt="Combinatie ten Cate" class="logo-img" 
                             onerror="this.onerror=null;this.src='/images/logo.svg'" />
                    </a>
                </div>

                <div class="header-title">
                    <a href="/">Combinatie ten Cate</a>
                </div>

                <div class="header-icons">
                    <a href="#" id="cart-icon" title="Winkelwagen" class="icon cart-icon-wrapper">
                        🛒
                        <span id="cart-count" class="cart-badge"></span>
                    </a>
                    <a href="#" title="User" class="icon">👤</a>
                    <a href="#" id="nav-toggle" class="icon" aria-label="Open navigatie">☰</a>
                </div>
            </div>
        </header>

        <main id="app" class="site-main">
            <div class="loading">Laden...</div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
